html, body {

/* Background video */
.bg-video {
  position:fixed; inset:0;

/* Click to enter */

  cursor:pointer;
  background:rgba(8,8,8,0.72);

  animation:pulse 2s ease-in-out infinite;
}

/* Page content */
#page-content {
  display:none;
  position:relative; z-index:2;
  width:100%; min-height:100vh;

  align-items:center; justify-content:center;

/* Volume control */

  position:fixed; top:15px; left:15px; z-index:100;
  display:none; align-items:center; justify-content:left;
  gap:15px;
  background-color:rgba(27,27,27,0.5);
  background-image:linear-gradient(25deg, rgba(29,98,183,0.5), rgba(2,30,95,0.5));
  background-origin:border-box;
  border:2px solid rgba(27,27,27,0.45);
  border-radius:15px;
  padding:12px;
  width:60px; height:60px;
  overflow:hidden;
  transition:width 0.35s ease;
  cursor:pointer;
  box-sizing:border-box;
}
.volume-control.visible { display:flex }
.volume-control:hover { width:190px }
.volume-icon { color:#fff; display:flex; align-items:center; flex-shrink:0; width:29px; height:29px }
.volume-icon svg { width:29px; height:29px }
.volume-slider {

  width:100px; height:3px; flex-shrink:0;
  background:rgba(255,255,255,0.5);
  border-radius:99px; outline:none; cursor:pointer;
  opacity:0; transition:opacity 0.2s;
}
.volume-control:hover .volume-slider { opacity:1 }
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:12px; height:12px; background:#fff; border-radius:50%;
}
.volume-slider::-moz-range-thumb {
  width:12px; height:12px; background:#fff; border-radius:50%; border:none;

  {url:"https://r2.guns.lol/61665d8c-5ba6-4ffa-b746-ee0cc675fec0.mp3",title:"⛦",cover:"https://r2.guns.lol/f19b181b-79b6-4119-8379-067194695866.webp"},
  {url:"https://r2.guns.lol/446e555c-10b6-40b5-9009-7093157413f2.mp3",title:"⛦",cover:"https://r2.guns.lol/48b92653-242a-47d4-8494-b770ce2cd64a.webp"}
];
var cur=0,playing=false;
var fill=document.getElementById('audioFill');
var curEl=document.getElementById('audioCur');
var durEl=document.getElementById('audioDur');
var titleEl=document.getElementById('audioTitle');
var coverEl=document.getElementById('audioCover');
var playBtn=document.getElementById('audioPlay');
var audioPlayIcon=document.getElementById('audioPlayIcon');
var pauseSVG='<path d="M14 19V5h4v14zm-8 0V5h4v14z"/>';
var playSVG='<path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/>';

function fmt(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec}
function loadTrack(i){
  var t=tracks[i];titleEl.textContent=t.title;coverEl.src=t.cover;bgAudio.src=t.url;
  if(playing) bgAudio.play().catch(function(){});
}
bgAudio.addEventListener('timeupdate',function(){
  if(!bgAudio.duration) return;
  fill.style.width=(bgAudio.currentTime/bgAudio.duration*100)+'%';
  curEl.textContent=fmt(bgAudio.currentTime);
  durEl.textContent=fmt(bgAudio.duration);
});
bgAudio.addEventListener('ended',function(){cur=(cur+1)%tracks.length;loadTrack(cur)});
playBtn.addEventListener('click',function(){
  if(playing){bgAudio.pause();playing=false;audioPlayIcon.innerHTML=playSVG}
  else{bgAudio.play().then(function(){playing=true;audioPlayIcon.innerHTML=pauseSVG}).catch(function(){})}
});
document.getElementById('audioPrev').addEventListener('click',function(){cur=(cur-1+tracks.length)%tracks.length;loadTrack(cur)});
document.getElementById('audioNext').addEventListener('click',function(){cur=(cur+1)%tracks.length;loadTrack(cur)});
document.getElementById('audioProgress').addEventListener('click',function(e){
  if(!bgAudio.duration) return;
  var rect=this.getBoundingClientRect();
  bgAudio.currentTime=(e.clientX-rect.left)/rect.width*bgAudio.duration;
});
loadTrack(cur);

// Volume
var volPath=document.getElementById('volPath');
var volSlider=document.getElementById('volumeSlider');
var lastVol=100, muted=false;
function updateVolIcon(v){
  volPath.setAttribute('mask', v===0 ? 'url(#vm-mute)' : 'url(#vm-on)');
}
volSlider.addEventListener('input',function(){
  var v=parseInt(this.value);
  bgAudio.volume=v/100;
  muted=(v===0);
  lastVol=v>0?v:lastVol;
  updateVolIcon(v);
});
document.getElementById('volumeIcon').addEventListener('click',function(){
  if(muted||bgAudio.volume===0){
    bgAudio.volume=lastVol/100;
    volSlider.value=lastVol;
    muted=false;
    updateVolIcon(lastVol);
  } else {
    lastVol=parseInt(volSlider.value)||100;
    bgAudio.volume=0;
    volSlider.value=0;
    muted=true;
    updateVolIcon(0);
  }
});

// Anonymous message
var btn=document.getElementById('anonBtn');
var msgEl=document.getElementById('anonMsg');
var statusEl=document.getElementById('anonStatus');
var remaining=3,cooldown=false;
btn.addEventListener('click',function(){
  var msg=msgEl.value.trim();
  if(!msg){statusEl.textContent="⚠ Write a message first";statusEl.className="anon-msg err";return}
  if(msg.length>500){statusEl.textContent="Too long";statusEl.className="anon-msg err";return}
  if(cooldown){statusEl.textContent="Wait a moment";statusEl.className="anon-msg err";return}
  btn.disabled=true;statusEl.textContent="";statusEl.className="anon-msg";
  fetch('/.netlify/functions/send-message',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})
  })
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.ok){
      msgEl.value="";remaining--;
      if(remaining<=0){
        cooldown=true;btn.disabled=true;var t=300;
        var iv=setInterval(function(){
          t--;statusEl.textContent="Wait "+t+"s";statusEl.className="anon-msg err";
          if(t<=0){clearInterval(iv);cooldown=false;remaining=3;btn.disabled=false;statusEl.textContent="";statusEl.className="anon-msg"}
        },1000);
      }else{btn.disabled=false;statusEl.textContent="✓ Sent ("+remaining+" left)";statusEl.className="anon-msg ok"}
    }else if(d.error==="banned"){
      statusEl.textContent="🚫 Blocked";statusEl.className="anon-msg err";btn.disabled=true;
    }else if(d.error==="rate_limit"){
      statusEl.textContent="Too many messages";statusEl.className="anon-msg err";btn.disabled=false;
    }else{
      statusEl.textContent="Error, try again";statusEl.className="anon-msg err";btn.disabled=false;
    }
  })
  .catch(function(){statusEl.textContent="Connection error";statusEl.className="anon-msg err";btn.disabled=false});
});

// Lanyard
var DISCORD_ID="745298901069725717";

function setStatusColor(s){
  var imgs={online:'https://assets.guns.lol/online.png',idle:'https://assets.guns.lol/idle.png',dnd:'https://assets.guns.lol/dnd.png',offline:'https://assets.guns.lol/offline.png'};
  var src=imgs[s]||imgs.offline;
  document.getElementById('presenceDot').src=src;
}
function updatePresence(data){
  setStatusColor(data.discord_status||'offline');
  if(data.discord_user&&data.discord_user.avatar){
    var av='https://cdn.discordapp.com/avatars/'+DISCORD_ID+'/'+data.discord_user.avatar+'.webp';
    document.getElementById('mainAvatar').src=av;
    document.getElementById('presenceAvatar').src=av;
  }
  // Avatar decoration
  var decoEl=document.querySelector('.avatar-deco');
  if(data.discord_user&&data.discord_user.avatar_decoration_data&&data.discord_user.avatar_decoration_data.asset){
    var asset=data.discord_user.avatar_decoration_data.asset;
    var decoUrl= asset.startsWith('a_')
      ? 'https://cdn.discordapp.com/avatar-decoration-presets/'+asset+'.png'
      : 'https://cdn.discordapp.com/avatar-decoration-presets/'+asset+'.png';
    decoEl.src=decoUrl;
    decoEl.style.display='block';
  } else {
    decoEl.style.display='none';
  }
  var activities=data.activities||[];
  var cs=null, spotify=null, activity=null;
  for(var i=0;i<activities.length;i++){
    var a=activities[i];
    if(a.type===4) cs=a;
    else if(a.id==='spotify:1') spotify=a;
    else if((a.type===0||a.type===1||a.type===2||a.type===3||a.type===5)&&!activity) activity=a;
  }

  var actImg=document.getElementById('activityImg');
  var statusEl=document.getElementById('presenceStatus');

  if(spotify){
    actImg.src='https://i.scdn.co/image/'+spotify.assets.large_image.replace('spotify:','');
    actImg.style.display='block';
    statusEl.innerHTML='<span class="activity-type">Listening to</span> '+spotify.details+' by '+(spotify.state||'').replace(/;/g,',');
  } else if(activity){
    var typeLabel={0:'Playing',1:'Streaming',2:'Listening to',3:'Watching',5:'Competing in'}[activity.type]||'';
    var imgUrl='';
    if(activity.assets&&activity.assets.large_image){
      var li=activity.assets.large_image;
      if(li.startsWith('mp:external/')) imgUrl='https://media.discordapp.net/external/'+li.replace('mp:external/','');
      else imgUrl='https://cdn.discordapp.com/app-assets/'+activity.application_id+'/'+li+'.png';
    }
    if(imgUrl){ actImg.src=imgUrl; actImg.style.display='block'; }
    else actImg.style.display='none';
    statusEl.innerHTML='<span class="activity-type">'+typeLabel+'</span> '+activity.name+(activity.details?' — '+activity.details:'');
  } else if(cs){
    actImg.style.display='none';
    var em='';
    if(cs.emoji&&!cs.emoji.id&&cs.emoji.name) em=cs.emoji.name;
    statusEl.innerHTML=(em?em+' ':'')+(cs.state||'currently doing nothing');
  } else {
    actImg.style.display='none';
    statusEl.innerHTML='currently doing nothing';
  }
}
function connectLanyard(){
  var ws=new WebSocket('wss://api.lanyard.rest/socket');
  var hb;
  ws.onmessage=function(e){
    var msg=JSON.parse(e.data);
    if(msg.op===1){
      ws.send(JSON.stringify({op:2,d:{subscribe_to_id:DISCORD_ID}}));
      hb=setInterval(function(){ws.send(JSON.stringify({op:3}))},msg.d.heartbeat_interval);
    }else if(msg.op===0){updatePresence(msg.d)}
  };
  ws.onclose=function(){clearInterval(hb);setTimeout(connectLanyard,5000)};
  ws.onerror=function(){ws.close()};
}
connectLanyard();

// Circular favicon
(function(){
  var img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    var c=document.createElement('canvas');
    c.width=c.height=64;
    var ctx=c.getContext('2d');
    ctx.beginPath();ctx.arc(32,32,32,0,Math.PI*2);ctx.closePath();ctx.clip();
    ctx.drawImage(img,0,0,64,64);
    document.getElementById('favicon').href=c.toDataURL();
  };
  img.src='https://cdn.discordapp.com/avatars/745298901069725717/c16d622ce447f43b769eb644928be90f.webp';
})();

// Typewriter title
(function(){
  var chars=['@','A','z','i','z',' ','\u2661'];
  var i=1, deleting=false, nextAt=Date.now();
  function tick(){
    var now=Date.now();
    if(now>=nextAt){
      document.title=chars.slice(0,i).join('');
      if(!deleting){
        if(i>=chars.length){ deleting=true; nextAt=now+1800; }
        else { i++; nextAt=now+150; }
      } else {
        if(i<=1){ deleting=false; nextAt=now+600; }
        else { i--; nextAt=now+80; }
      }
    }
    setTimeout(tick,50);
  }
  tick();
})();

})();
